<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WanderSiam Professional Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .risk-row { background-color: #fee2e2; border-left: 4px solid #ef4444; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <div class="bg-white p-6 rounded-lg shadow-md mb-6 flex flex-col md:flex-row justify-between items-center gap-4 border-l-4 border-blue-600">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">WanderSiam Real-time Dashboard</h1>
                <p class="text-sm text-gray-500 mt-1">Analytics Mode: SQL View Aggregation (Optimized for 40k+ Rows)</p>
            </div>
            <div id="connectionStatus" class="flex items-center gap-2 px-3 py-1 rounded-full bg-yellow-100 text-yellow-700 text-sm font-bold">
                กำลังโหลดข้อมูล...
            </div>
        </div>

        <div id="dashboardContent" class="hidden">
            <div class="bg-white p-4 rounded-lg shadow-md mb-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 items-end">
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase mb-1">เดือน (Month)</label>
                    <select id="filterMonth" class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:ring-2 focus:ring-blue-500"></select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase mb-1">ไกด์ (Tour Guide)</label>
                    <select id="filterGuide" class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:ring-2 focus:ring-blue-500"></select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase mb-1">ชื่อทัวร์ (Tour)</label>
                    <select id="filterTour" class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:ring-2 focus:ring-blue-500"></select>
                </div>
                <div class="flex items-center gap-2 mb-2">
                    <input type="checkbox" id="checkRisk" class="w-5 h-5 text-red-600 rounded">
                    <label for="checkRisk" class="text-xs font-bold text-red-700 uppercase">เฉพาะทัวร์เสี่ยงขาดทุน (Pax < 3)</label>
                </div>
                <div>
                    <button id="resetFilters" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded transition">รีเซ็ต</button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                <div class="bg-white p-6 rounded-lg shadow-md border-b-4 border-blue-500">
                    <h3 class="text-sm font-semibold text-gray-500 uppercase">ยอดจอง (Groups/Rounds)</h3>
                    <p id="kpiTotalBookings" class="text-4xl font-bold text-gray-900 mt-2">0</p>
                </div>
                <div class="bg-white p-6 rounded-lg shadow-md border-b-4 border-green-500">
                    <h3 class="text-sm font-semibold text-gray-500 uppercase">รายได้รวม (Income)</h3>
                    <p id="kpiTotalIncome" class="text-4xl font-bold text-gray-900 mt-2">฿0</p>
                </div>
                <div class="bg-white p-6 rounded-lg shadow-md border-b-4 border-red-500">
                    <h3 class="text-sm font-semibold text-gray-500 uppercase">กลุ่มเสี่ยง (Risk Groups)</h3>
                    <p id="kpiRiskCount" class="text-4xl font-bold text-red-600 mt-2">0</p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                <div class="bg-white p-6 rounded-lg shadow-md h-80">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">รายได้ตามเอเยนต์</h3>
                    <canvas id="chartMerchant"></canvas>
                </div>
                <div class="bg-white p-6 rounded-lg shadow-md h-80">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">สถานะกำไร/ขาดทุน (รอบบริการ)</h3>
                    <canvas id="chartRisk"></canvas>
                </div>
                <div class="bg-white p-6 rounded-lg shadow-md h-96 lg:col-span-2">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">ทัวร์ทำเงินสูงสุด (Top 5 Tours)</h3>
                    <canvas id="chartTours"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://ibmrskcssblrroveuvxd.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlibXJza2Nzc2JscnJvdmV1dnhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNjQ3ODAsImV4cCI6MjA5Mzg0MDc4MH0.ep1-QM9RkA3QkfrbFQa-LLvs7KADTnrmNDqZarLSMY0';
        
        const { createClient } = supabase;
        const supabaseClient = createClient(supabaseUrl, supabaseKey);
        
        let rawData = [];
        let chartInstances = {};
        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

        async function fetchSupabaseData() {
            try {
                // *** ดึงข้อมูลจาก View ที่เราจะสร้างชื่อ dashboard_analytics ***
                const { data, error } = await supabaseClient
                    .from('dashboard_analytics')
                    .select('*')
                    .limit(5000); // มั่นใจได้ว่าข้อมูล Group แล้วจะไม่เกินลิมิต Browser

                if (error) throw error;

                rawData = data.map(row => {
                    let monthStr = "Unknown";
                    if (row.DATE) {
                        const dateObj = new Date(row.DATE);
                        monthStr = !isNaN(dateObj.getTime()) ? monthNames[dateObj.getMonth()] : "Unknown";
                    }
                    return {
                        ...row,
                        month: monthStr,
                        income: parseFloat(row.total_income) || 0,
                        pax: parseInt(row.total_pax) || 0,
                        guide: row["TOUR GUIDE"] || "No Guide",
                        tour: row["TOUR NAME"] || "Unknown Tour",
                        merchant: row.Merchant || "Direct"
                    };
                });

                updateConnectionStatus(rawData.length);
                document.getElementById('dashboardContent').classList.remove('hidden');
                populateFilters();
                updateDashboard();

            } catch (err) {
                console.error("Fetch Error:", err);
                document.getElementById('connectionStatus').innerText = '❌ Error: ไม่พบ View หรือการเชื่อมต่อผิดพลาด';
            }
        }

        function populateFilters() {
            const months = [...new Set(rawData.map(d => d.month))].sort((a,b) => monthNames.indexOf(a) - monthNames.indexOf(b));
            const guides = [...new Set(rawData.map(d => d.guide))].sort();
            const tours = [...new Set(rawData.map(d => d.tour))].sort();

            fillSelect('filterMonth', months);
            fillSelect('filterGuide', guides);
            fillSelect('filterTour', tours);

            document.querySelectorAll('select, input[type="checkbox"]').forEach(el => el.onchange = updateDashboard);
            document.getElementById('resetFilters').onclick = () => {
                document.querySelectorAll('select').forEach(el => el.value = 'ALL');
                document.getElementById('checkRisk').checked = false;
                updateDashboard();
            };
        }

        function fillSelect(id, opts) {
            const el = document.getElementById(id);
            const current = el.value;
            el.innerHTML = '<option value="ALL">ทั้งหมด</option>';
            opts.forEach(o => el.innerHTML += `<option value="${o}">${o}</option>`);
            el.value = current || 'ALL';
        }

        function updateDashboard() {
            const mFilter = document.getElementById('filterMonth').value;
            const gFilter = document.getElementById('filterGuide').value;
            const tFilter = document.getElementById('filterTour').value;
            const riskOnly = document.getElementById('checkRisk').checked;

            const filtered = rawData.filter(d => 
                (mFilter === 'ALL' || d.month === mFilter) &&
                (gFilter === 'ALL' || d.guide === gFilter) &&
                (tFilter === 'ALL' || d.tour === tFilter) &&
                (!riskOnly || d.profit_status === 'RISK')
            );

            // KPI
            const totalIncome = filtered.reduce((s, r) => s + r.income, 0);
            const riskCount = filtered.filter(d => d.profit_status === 'RISK').length;
            
            document.getElementById('kpiTotalBookings').innerText = filtered.length.toLocaleString();
            document.getElementById('kpiTotalIncome').innerText = '฿' + Math.round(totalIncome).toLocaleString();
            document.getElementById('kpiRiskCount').innerText = riskCount.toLocaleString();

            renderCharts(filtered);
        }

        function renderCharts(data) {
            // Chart Merchant
            const merData = aggregate(data, 'merchant', 'income');
            updateChart('chartMerchant', 'pie', Object.keys(merData), Object.values(merData), 'รายได้');

            // Chart Risk Status
            const riskData = aggregate(data, 'profit_status', 'count');
            updateChart('chartRisk', 'doughnut', Object.keys(riskData), Object.values(riskData), 'รอบบริการ', ['#ef4444', '#10b981']);

            // Chart Tours
            const tourData = aggregate(data, 'tour', 'income');
            const sortedTours = Object.entries(tourData).sort((a,b) => b[1]-a[1]).slice(0, 5);
            updateChart('chartTours', 'bar', sortedTours.map(t => t[0]), sortedTours.map(t => t[1]), 'รายได้รวม (Top 5)', '#3b82f6', 'y');
        }

        function aggregate(data, key, type) {
            return data.reduce((acc, curr) => {
                const k = curr[key] || "Unknown";
                acc[k] = (acc[k] || 0) + (type === 'count' ? 1 : curr[type]);
                return acc;
            }, {});
        }

        function updateChart(id, type, labels, values, label, colors, axis = 'x') {
            if (chartInstances[id]) chartInstances[id].destroy();
            chartInstances[id] = new Chart(document.getElementById(id), {
                type: type,
                data: {
                    labels: labels,
                    datasets: [{ 
                        label: label, 
                        data: values, 
                        backgroundColor: colors || ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'] 
                    }]
                },
                options: { 
                    indexAxis: axis, 
                    maintainAspectRatio: false,
                    plugins: { legend: { display: (type === 'pie' || type === 'doughnut'), position: 'bottom' } }
                }
            });
        }

        function updateConnectionStatus(count) {
            const el = document.getElementById('connectionStatus');
            el.innerHTML = `● ดึงข้อมูลสำเร็จ (${count.toLocaleString()} กลุ่ม)`;
            el.className = 'flex items-center gap-2 px-3 py-1 rounded-full bg-green-100 text-green-700 text-sm font-bold';
        }

        fetchSupabaseData();
    </script>
</body>
</html>
