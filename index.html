<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Executive Insights | WanderSiam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; background-color: #f8fafc; }
        .card-shadow { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
        select { -webkit-appearance: none; background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3E%3Cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3E%3C/svg%3E"); background-position: right 0.5rem center; background-repeat: no-repeat; background-size: 1.5em 1.5em; }
    </style>
</head>
<body class="pb-10">

    <nav class="bg-white border-b border-gray-100 px-5 py-4 sticky top-0 z-50">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <span class="text-lg font-black text-slate-900 tracking-tighter italic">WANDERSIAM <span class="text-blue-600 font-normal not-italic">BI</span></span>
            <div id="status" class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Loading...</div>
        </div>
    </nav>

    <div class="max-w-xl mx-auto px-5 pt-6 space-y-6">
        
        <div class="bg-white p-4 rounded-2xl card-shadow border border-gray-100">
            <p class="text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest">Select Analytics Period</p>
            <select id="filterMonth" class="w-full bg-slate-50 border-0 text-lg font-bold rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 text-slate-800"></select>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-5 rounded-3xl card-shadow border border-gray-50">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Net Bookings</p>
                <h2 id="kpiNetBookings" class="text-3xl font-black text-slate-900">0</h2>
                <div class="h-1 w-8 bg-blue-500 mt-2 rounded-full"></div>
            </div>
            <div class="bg-white p-5 rounded-3xl card-shadow border border-gray-50">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Net Revenue</p>
                <h2 id="kpiNetIncome" class="text-2xl font-black text-emerald-600">฿0</h2>
                <div class="h-1 w-8 bg-emerald-500 mt-2 rounded-full"></div>
            </div>
            <div class="bg-rose-50 p-5 rounded-3xl border border-rose-100">
                <p class="text-[10px] font-bold text-rose-400 uppercase mb-1">Canceled Cases</p>
                <h2 id="kpiCancelCount" class="text-3xl font-black text-rose-600">0</h2>
            </div>
            <div class="bg-rose-50 p-5 rounded-3xl border border-rose-100">
                <p class="text-[10px] font-bold text-rose-400 uppercase mb-1">Lost Revenue</p>
                <h2 id="kpiLostIncome" class="text-2xl font-black text-rose-600">฿0</h2>
            </div>
        </div>

        <div class="bg-white p-6 rounded-3xl card-shadow">
            <h3 class="text-xs font-black text-slate-800 mb-6 uppercase tracking-widest">🏆 Top Performing Tours</h3>
            <div class="h-80">
                <canvas id="chartTours"></canvas>
            </div>
        </div>

        <div class="bg-white p-6 rounded-3xl card-shadow">
            <h3 class="text-xs font-black text-slate-800 mb-6 uppercase tracking-widest">💼 Merchant Share (Income)</h3>
            <div class="h-64">
                <canvas id="chartMerchant"></canvas>
            </div>
        </div>

        <div class="bg-white p-6 rounded-3xl card-shadow">
            <h3 class="text-xs font-black text-slate-800 mb-6 uppercase tracking-widest">📈 Revenue Trend</h3>
            <div class="h-56">
                <canvas id="chartTrend"></canvas>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://ibmrskcssblrroveuvxd.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlibXJza2Nzc2JscnJvdmV1dnhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNjQ3ODAsImV4cCI6MjA5Mzg0MDc4MH0.ep1-QM9RkA3QkfrbFQa-LLvs7KADTnrmNDqZarLSMY0';
        const { createClient } = supabase;
        const supabaseClient = createClient(supabaseUrl, supabaseKey);

        let rawData = [];
        let chartInstances = {};
        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

        const merchantColors = {
            'VIATOR': '#006600',
            'GET YOUR GUIDE': '#ff6600',
            'WANDERSIAM': '#3385ff',
            'AIR BNB': '#ff00ff',
            'DEFAULT': '#e2e8f0'
        };

        async function init() {
            try {
                const { data, error } = await supabaseClient.from('wander_ceo_dashboard').select('*');
                if (error) throw error;

                rawData = data.map(r => ({
                    ...r,
                    monthKey: monthNames[new Date(r.DATE).getMonth()] + ' ' + new Date(r.DATE).getFullYear(),
                    rawDate: new Date(r.DATE),
                    merchant: r.merchant ? r.merchant.toUpperCase().trim() : 'DIRECT'
                }));

                const status = document.getElementById('status');
                status.innerText = 'Online 🟢';
                status.className = 'text-[10px] font-bold uppercase tracking-widest text-emerald-500';

                setupFilters();
                render();
            } catch (e) {
                document.getElementById('status').innerText = 'Offline 🔴';
            }
        }

        function setupFilters() {
            const months = [...new Set(rawData.map(d => d.monthKey))].sort((a,b) => {
                return rawData.find(d => d.monthKey === b).rawDate - rawData.find(d => d.monthKey === a).rawDate;
            });
            const sel = document.getElementById('filterMonth');
            months.forEach(m => sel.innerHTML += `<option value="${m}">${m}</option>`);
            sel.onchange = render;
        }

        function render() {
            const filter = document.getElementById('filterMonth').value;
            const data = rawData.filter(d => d.monthKey === filter);

            // KPIs
            const netB = data.reduce((s, r) => s + parseInt(r.net_bookings), 0);
            const netI = data.reduce((s, r) => s + parseFloat(r.net_revenue), 0);
            const canC = data.reduce((s, r) => s + parseInt(r.cancel_count), 0);
            const lostI = data.reduce((s, r) => s + parseFloat(r.lost_revenue), 0);

            document.getElementById('kpiNetBookings').innerText = netB.toLocaleString();
            document.getElementById('kpiNetIncome').innerText = '฿' + formatNum(netI);
            document.getElementById('kpiCancelCount').innerText = canC.toLocaleString();
            document.getElementById('kpiLostIncome').innerText = '฿' + formatNum(lostI);

            // Charts
            updateToursChart(data);
            updateMerchantChart(data);
            updateTrendChart();
        }

        function formatNum(n) {
            if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
            if (n >= 1000) return (n/1000).toFixed(1) + 'k';
            return n.toLocaleString();
        }

        function updateToursChart(data) {
            const agg = {};
            data.forEach(r => agg[r.tour] = (agg[r.tour] || 0) + r.net_revenue);
            const sorted = Object.entries(agg).sort((a,b) => b[1]-a[1]).slice(0, 5);
            
            draw('chartTours', 'bar', sorted.map(t => t[0]), sorted.map(t => t[1]), 'Revenue', '#3b82f6', 'y');
        }

        function updateMerchantChart(data) {
            const agg = {};
            data.forEach(r => agg[r.merchant] = (agg[r.merchant] || 0) + r.net_revenue);
            const labels = Object.keys(agg);
            const colors = labels.map(l => {
                for(let key in merchantColors) if(l.includes(key)) return merchantColors[key];
                return merchantColors.DEFAULT;
            });

            draw('chartMerchant', 'doughnut', labels, Object.values(agg), 'Share', colors);
        }

        function updateTrendChart() {
            const agg = {};
            // Trend ดูจากข้อมูลทั้งหมด
            rawData.forEach(r => agg[r.monthKey] = (agg[r.monthKey] || 0) + r.net_revenue);
            const sortedKeys = Object.keys(agg).sort((a,b) => rawData.find(d => d.monthKey === a).rawDate - rawData.find(d => d.monthKey === b).rawDate);
            
            draw('chartTrend', 'line', sortedKeys, sortedKeys.map(k => agg[k]), 'Revenue', '#0f172a');
        }

        function draw(id, type, labels, values, label, color, axis = 'x') {
            if (chartInstances[id]) chartInstances[id].destroy();
            const ctx = document.getElementById(id).getContext('2d');
            chartInstances[id] = new Chart(ctx, {
                type: type,
                data: {
                    labels: labels,
                    datasets: [{ label, data: values, backgroundColor: color, borderColor: color, fill: false, tension: 0.4, borderRadius: 8 }]
                },
                options: {
                    indexAxis: axis,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: type === 'doughnut', position: 'bottom', labels: { usePointStyle: true, font: { size: 9 } } } },
                    scales: type !== 'doughnut' ? { 
                        x: { grid: { display: false }, ticks: { font: { size: 9 } } }, 
                        y: { display: axis === 'x', grid: { color: '#f1f5f9' }, ticks: { font: { size: 9 } } } 
                    } : {}
                }
            });
        }

        init();
    </script>
</body>
</html>
