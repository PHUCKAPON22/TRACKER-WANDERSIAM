<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WanderSiam CEO Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f8fafc; }
        ::-webkit-scrollbar { display: none; }
        .card { background: #ffffff; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border: 1px solid #f1f5f9; }
    </style>
</head>
<body class="text-gray-800 pb-12">

    <div class="bg-slate-900 text-white p-5 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black tracking-tight">WanderSiam</h1>
                <p class="text-xs text-slate-400">Executive Analytics</p>
            </div>
            <div id="connectionStatus" class="text-xs font-bold px-3 py-1 bg-slate-800 rounded-full text-slate-300">
                Syncing...
            </div>
        </div>
    </div>

    <div id="errorBox" class="max-w-4xl mx-auto px-4 mt-4 hidden"></div>

    <div class="max-w-4xl mx-auto px-4 mt-6 space-y-6">
        
        <div class="card p-4">
            <label class="block text-xs font-bold text-slate-500 uppercase mb-2">เลือกเดือนเพื่อวิเคราะห์</label>
            <select id="filterMonth" class="w-full bg-slate-50 border border-slate-200 text-base rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-800 shadow-sm appearance-none"></select>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="card p-5 border-t-4 border-t-blue-500">
                <p class="text-xs text-slate-500 font-bold uppercase tracking-wider mb-1">ยอดจอง (Bookings)</p>
                <h2 id="kpiNetBookings" class="text-3xl font-black text-slate-900">0</h2>
                <p class="text-[10px] text-slate-400 mt-1">จำนวนบุ๊กกิ้งสุทธิ</p>
            </div>
            <div class="card p-5 border-t-4 border-t-emerald-500">
                <p class="text-xs text-slate-500 font-bold uppercase tracking-wider mb-1">รายได้ (Revenue)</p>
                <h2 id="kpiNetIncome" class="text-2xl font-black text-emerald-600">฿0</h2>
                <p class="text-[10px] text-slate-400 mt-1">รายได้ที่รับจริง</p>
            </div>
            <div class="card p-5 border-t-4 border-t-rose-500 bg-rose-50">
                <p class="text-xs text-rose-500 font-bold uppercase tracking-wider mb-1">ยกเลิก (Canceled)</p>
                <h2 id="kpiCancelCount" class="text-3xl font-black text-rose-700">0</h2>
                <p class="text-[10px] text-rose-400 mt-1">จำนวนเคสยกเลิก</p>
            </div>
            <div class="card p-5 border-t-4 border-t-amber-500 bg-amber-50">
                <p class="text-xs text-amber-600 font-bold uppercase tracking-wider mb-1">ความเสี่ยง (Risk Rounds)</p>
                <h2 id="kpiRiskCount" class="text-3xl font-black text-amber-700">0</h2>
                <p class="text-[10px] text-amber-600 mt-1">รอบทัวร์ขาดทุน (ลูกค้า 1 คน)</p>
            </div>
        </div>

        <div class="card p-5">
            <h3 class="text-sm font-black text-slate-800 mb-4 uppercase">🏆 ทัวร์ขายดีประจำเดือน</h3>
            <div class="h-64 relative"><canvas id="chartTours"></canvas></div>
        </div>
        <div class="card p-5">
            <h3 class="text-sm font-black text-slate-800 mb-4 uppercase">💼 สัดส่วน Merchant</h3>
            <div class="h-64 relative"><canvas id="chartMerchant"></canvas></div>
        </div>
        <div class="card p-5">
            <h3 class="text-sm font-black text-slate-800 mb-4 uppercase">📈 แนวโน้มรายได้</h3>
            <div class="h-56 relative"><canvas id="chartTrend"></canvas></div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://ibmrskcssblrroveuvxd.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlibXJza2Nzc2JscnJvdmV1dnhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNjQ3ODAsImV4cCI6MjA5Mzg0MDc4MH0.ep1-QM9RkA3QkfrbFQa-LLvs7KADTnrmNDqZarLSMY0';
        
        const { createClient } = supabase;
        const supabaseClient = createClient(supabaseUrl, supabaseKey);
        
        let rawData = [];
        let chartInstances = {};
        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

        const merchantColors = {
            'VIATOR': '#006600',
            'GET YOUR GUIDE': '#ff6600',
            'WANDERSIAM': '#3385ff',
            'AIR BNB': '#ff00ff',
            'DEFAULT': '#94a3b8' 
        };

        async function fetchSupabaseData() {
            try {
                // ดึงจาก View ล่าสุดที่รวบยอดมาให้แล้ว
                const { data, error } = await supabaseClient
                    .from('wander_ceo_monthly_summary')
                    .select('*')
                    .limit(10000);

                if (error) throw error;

                // แมพคอลัมน์ให้ตรงกับที่ Database ส่งมา
                rawData = data.map(row => {
                    const rawDate = row.sort_date ? new Date(row.sort_date) : new Date();
                    const monthStr = row.month_year || "Unknown";

                    return {
                        month: monthStr,
                        rawDate: rawDate,
                        net_bookings: parseInt(row.net_bookings) || 0,
                        cancel_count: parseInt(row.cancel_count) || 0,
                        net_income: parseFloat(row.net_income) || 0,
                        // ดึงยอดทัวร์ขาดทุนที่คำนวณจาก View มาใส่
                        loss_making: parseInt(row.loss_making_bookings) || 0,
                        tour: row.tour_name && row.tour_name !== 'null' ? String(row.tour_name).trim() : "Unknown Tour",
                        merchant: row.merchant && row.merchant !== 'null' ? String(row.merchant).toUpperCase().trim() : "DIRECT"
                    };
                });

                document.getElementById('connectionStatus').innerText = 'Live 🟢';
                document.getElementById('connectionStatus').classList.replace('text-slate-300', 'text-emerald-400');
                
                populateFilters();
                updateDashboard();

            } catch (err) {
                console.error("Fetch Error:", err);
                document.getElementById('connectionStatus').innerText = 'Offline 🔴';
                document.getElementById('errorBox').classList.remove('hidden');
                document.getElementById('errorBox').innerHTML = `<div class="bg-rose-100 text-rose-700 p-3 rounded text-sm"><b>Error:</b> ${err.message}</div>`;
            }
        }

        function populateFilters() {
            const uniqueMonths = [...new Set(rawData.map(d => d.month))];
            
            uniqueMonths.sort((a, b) => {
                const dateA = rawData.find(d => d.month === a).rawDate;
                const dateB = rawData.find(d => d.month === b).rawDate;
                return dateB - dateA; 
            });

            const el = document.getElementById('filterMonth');
            el.innerHTML = '<option value="ALL">ดูทุกเดือน (All Time)</option>';
            uniqueMonths.forEach(m => el.innerHTML += `<option value="${m}">${m}</option>`);
            if(uniqueMonths.length > 0) el.value = uniqueMonths[0]; 
            el.onchange = updateDashboard;
        }

        function updateDashboard() {
            const mFilter = document.getElementById('filterMonth').value;
            const filtered = rawData.filter(d => mFilter === 'ALL' || d.month === mFilter);

            // ใช้ reduce บวกเลขทุกบรรทัด ยอด 5980 จะมาเต็มๆ ไม่ใช่ 2528
            const netBookings = filtered.reduce((sum, row) => sum + row.net_bookings, 0);
            const netIncome = filtered.reduce((sum, row) => sum + row.net_income, 0);
            const cancelCount = filtered.reduce((sum, row) => sum + row.cancel_count, 0);
            const riskCount = filtered.reduce((sum, row) => sum + row.loss_making, 0);
            
            document.getElementById('kpiNetBookings').innerText = netBookings.toLocaleString();
            document.getElementById('kpiNetIncome').innerText = '฿' + netIncome.toLocaleString();
            document.getElementById('kpiCancelCount').innerText = cancelCount.toLocaleString();
            document.getElementById('kpiRiskCount').innerText = riskCount.toLocaleString();

            renderCharts(filtered);
        }

        function renderCharts(data) {
            if(data.length === 0) return;

            // 1. Chart: ทัวร์ขายดี
            const tourData = aggregate(data, 'tour', 'net_income');
            const sortedTours = Object.entries(tourData).sort((a,b) => b[1]-a[1]).slice(0, 7);
            const tourLabels = sortedTours.length > 0 ? sortedTours.map(t => t[0]) : ['No Data'];
            const tourValues = sortedTours.length > 0 ? sortedTours.map(t => t[1]) : [0];
            updateChart('chartTours', 'bar', tourLabels, tourValues, 'รายได้สุทธิ (฿)', '#3b82f6', 'y');

            // 2. Chart: Merchant
            const merData = aggregate(data, 'merchant', 'net_income');
            const merLabels = Object.keys(merData).length > 0 ? Object.keys(merData) : ['No Data'];
            const merValues = Object.keys(merData).length > 0 ? Object.values(merData) : [0];
            
            const merBgColors = merLabels.map(label => {
                let matchColor = merchantColors['DEFAULT'];
                const safeLabel = String(label).toUpperCase();
                for (const key in merchantColors) {
                    if (safeLabel.includes(key)) { matchColor = merchantColors[key]; break; }
                }
                return matchColor;
            });
            updateChart('chartMerchant', 'doughnut', merLabels, merValues, 'Net Revenue', merBgColors);

            // 3. Chart: Trend
            const trendData = aggregate(rawData, 'month', 'net_income');
            const sortedTrendLabels = Object.keys(trendData).sort((a, b) => {
                const dateA = rawData.find(d => d.month === a).rawDate;
                const dateB = rawData.find(d => d.month === b).rawDate;
                return dateA - dateB; 
            });
            const trendValuesSafe = sortedTrendLabels.length > 0 ? sortedTrendLabels.map(m => trendData[m]) : [0];
            updateChart('chartTrend', 'bar', sortedTrendLabels, trendValuesSafe, 'Revenue', '#0f172a');
        }

        function aggregate(data, key, type) {
            return data.reduce((acc, curr) => {
                const k = curr[key] || "Unknown";
                acc[k] = (acc[k] || 0) + (curr[type] || 0); 
                return acc;
            }, {});
        }

        function updateChart(id, type, labels, values, label, colors, axis = 'x') {
            if (chartInstances[id]) chartInstances[id].destroy();
            const ctx = document.getElementById(id);
            if(!ctx) return; 

            chartInstances[id] = new Chart(ctx, {
                type: type,
                data: {
                    labels: labels,
                    datasets: [{ 
                        label: label, 
                        data: values, 
                        backgroundColor: colors,
                        borderRadius: type === 'bar' ? 4 : 0
                    }]
                },
                options: { 
                    indexAxis: axis, 
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: type === 'doughnut', position: 'bottom', labels: { boxWidth: 12, font: {size: 10} } } 
                    },
                    scales: type === 'bar' ? { 
                        x: { grid: {display: false}, beginAtZero: true }, 
                        y: { display: axis === 'y', beginAtZero: true } 
                    } : {}
                }
            });
        }

        // สั่งทำงาน
        fetchSupabaseData();
    </script>
</body>
</html>
